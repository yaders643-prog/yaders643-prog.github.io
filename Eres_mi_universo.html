    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000;
        }

        .universo {
            width: 100vw;
            height: 100vh;
            position: relative;
            overflow: hidden;
        }

        /* Nebulosa y Vía Láctea fijas */
        .nebulosa {
            position: absolute;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 20% 30%, rgba(138, 43, 226, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(25, 25, 112, 0.2) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(72, 61, 139, 0.1) 0%, transparent 60%);
            filter: blur(60px);
        }

        /* Capas de estrellas */
        .estrella {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: titila 4s infinite;
        }
    
    
    
.estrella-fugaz {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    border-radius: 50%;
    box-shadow: 0 0 8px white, 0 0 15px white;

    z-index: 1; /* detrás de planetas */
}
        @keyframes titila {
            0%, 100% { opacity: 0.8; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(0.9); }
        }

        /* El Sol */
        .sol-contenedor {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            cursor: pointer;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .sol {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background-image: url('https://raw.githubusercontent.com/yaders643-prog/imagenes-web/ffb2baf8881103821df269821829dfd9b0c137da/580b585b2edbce24c47b270f.png');
            background-size: cover;
            box-shadow: 0 0 60px 15px rgba(255, 200, 0, 0.6);
            animation: pulsarSol 8s infinite ease-in-out;
        }

        @keyframes pulsarSol {
            0%, 100% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.02); filter: brightness(1.1); }
        }

        /* CONFIGURACIÓN DE PLANETAS FIJOS */
        .planeta-estatico {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: transform 0.3s ease;
    cursor: pointer;
    z-index: 10; /* 👈 IMPORTANTE */
}

        .planeta-estatico:hover {
            transform: scale(1.1);
            z-index: 20;
        }

        .imagen-planeta {
            background-size: cover;
            background-position: center;
            border-radius: 50%;
            animation: flotarSolo 6s ease-in-out infinite;
        }

        @keyframes flotarSolo {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .pos-tierra { top: 10%; left: 8%; }

.pos-marte { top: 10%; right: 8%; }

.pos-jupiter { bottom: 25%; left: 5%; }

.pos-saturno { bottom: 30%; right: 0%; }

.pos-luna { top: 35%; right: 10%; }

.pos-mercurio { top: 5%; left: 50%; }

.pos-venus { top: 35%; left: 15%; }

.pos-urano { bottom: 5%; right: 25%; }

.pos-neptuno { top: 70%; left: 50%; }

}

.texto-sol {

     font-size: clamp(0.5em, 1.2vw, 1em); /* 👈 MÁS PEQUEÑO */

}

        /* Color de letra blanco para los mensajes */
        .mensaje {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);

    background: rgba(10, 10, 30, 0.95);
    padding: 25px; /* 👈 menos espacio */

}
        
        .mensaje.mostrar { transform: translate(-50%, -50%) scale(1); opacity: 1; }

            padding: 10px 20px;

        }
    
.estrella-fugaz {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    border-radius: 50%;
    box-shadow: 0 0 8px white, 0 0 15px white;
}
    

/* cola */
.estrella-fugaz::after {
    content: '';
    position: absolute;
    width: 120px;
    height: 2px;
    background: linear-gradient(to right, rgba(255,255,255,0.8), transparent);
    top: 50%;
    left: -120px;
    transform: translateY(-50%) rotate(45deg);
    animation: cruzar-diagonal 1.5s linear infinite;
}
    /* 👨‍🚀 Astronauta */
.astronauta{

/* Animación astronauta */

/* animación base */

    0% { opacity: 0; }
    5% { opacity: 1; }
    100% { opacity: 0; }
}

        <div class="mensaje" id="mensaje">

<div class="estrella-fugaz"></div>
    <script>
        function crearEstrellas() {
            const lejanas = document.getElementById('estrellasLejanas');
            for (let i = 0; i < 300; i++) {
                const estrella = document.createElement('div');
                estrella.className = 'estrella';
                estrella.style.width = '1px';
                estrella.style.height = '1px';
                estrella.style.left = Math.random() * 100 + '%';
                estrella.style.top = Math.random() * 100 + '%';
                estrella.style.animationDelay = Math.random() * 5 + 's';
                lejanas.appendChild(estrella);
            }
        }

        function mostrarMensaje(titulo, texto) {
            const mensaje = document.getElementById('mensaje');
            const tituloElemento = document.getElementById('mensaje-titulo');
            const textoElemento = document.getElementById('mensaje-texto');
            
            tituloElemento.textContent = titulo;
            textoElemento.textContent = texto;
            mensaje.classList.add('mostrar');
        }
        function cerrarMensaje() { document.getElementById('mensaje').classList.remove('mostrar'); }

        window.onload = crearEstrellas;
    function crearEstrellaFugaz() {
    const universo = document.getElementById('universo');
    const estrella = document.createElement('div');

    estrella.className = 'estrella-fugaz';

    // Elegir lado aleatorio
    const lado = Math.floor(Math.random() * 4);

    let x = 0;
    let y = 0;
    let translateX = 0;
    let translateY = 0;

    if (lado === 0) { // izquierda
        x = -10;
        y = Math.random() * 100;
        translateX = 120;
        translateY = 50;
    } else if (lado === 1) { // arriba
        x = Math.random() * 100;
        y = -10;
        translateX = 50;
        translateY = 120;
    } else if (lado === 2) { // derecha
        x = 110;
        y = Math.random() * 100;
        translateX = -120;
        translateY = 50;
    } else { // abajo
        x = Math.random() * 100;
        y = 110;
        translateX = 50;
        translateY = -120;
    }

    estrella.style.left = x + 'vw';
    estrella.style.top = y + 'vh';

    estrella.style.animation = `moverEstrella 2s linear forwards`;

    // animación dinámica
    const style = document.createElement('style');
    style.innerHTML = `
    @keyframes moverEstrella {
        0% { transform: translate(0,0); opacity: 0; }
        10% { opacity: 1; }
        100% { transform: translate(${translateX}vw, ${translateY}vh); opacity: 0; }
    }`;
    document.head.appendChild(style);

    universo.appendChild(estrella);

    // eliminar después
    setTimeout(() => {
        estrella.remove();
        style.remove();
    }, 2000);
}

// generar continuamente
setInterval(crearEstrellaFugaz, 1200);
    
  document.addEventListener('contextmenu', function(e) {
    e.preventDefault();
});
    
document.addEventListener('keydown', function(e) {
    // Bloquear Ctrl+C, Ctrl+U, Ctrl+S, Ctrl+X
    if (e.ctrlKey && (
        e.key === 'c' || 
        e.key === 'u' || 
        e.key === 's' || 
        e.key === 'x'
    )) {
        e.preventDefault();
    }

    // Bloquear F12 (inspeccionar)
    if (e.key === 'F12') {
        e.preventDefault();
    }
});    
    
    </script>
