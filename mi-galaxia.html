  <body>
    <div id="root"></div>
		<audio
			id="bg-music"
			src="https://github.com/yaders643-prog/M-sica-amor./raw/814944128141a0d3d6eaee5bf71c5329c216c41a/Mi%20Dulce%20Amor%20-%20Los%20Inquietos%20del%20Vallenato%20(Video%20Oficial)(MP3_160K).mp3"
			autoplay
			loop
			preload="auto"
			playsinline
		></audio>

		<div
			id="music-bar"
			style="
				position: fixed;
				top: 12px;
				left: 50%;
				transform: translateX(-50%);
				z-index: 99999;
				display: flex;
				align-items: center;
				gap: 10px;
				width: min(560px, calc(100vw - 24px));
				padding: 10px 12px;
				border-radius: 14px;
				border: 1px solid #00eaff;
				box-shadow: 0 0 10px rgba(0,234,255,0.6), 0 0 24px rgba(0,234,255,0.35);
				background: rgba(0,0,0,0.62);
				color: #fff;
				backdrop-filter: blur(8px);
			"
		>
			<button
				id="music-toggle"
				type="button"
				aria-label="Pausar musica"
				style="
					width: 34px;
					height: 34px;
					border-radius: 999px;
					border: 1px solid rgba(0,234,255,0.8);
					background: rgba(0,234,255,0.14);
					color: #8ff8ff;
					font-size: 16px;
					line-height: 1;
					cursor: pointer;
					display: inline-flex;
					align-items: center;
					justify-content: center;
					box-shadow: 0 0 8px rgba(0,234,255,0.45);
				"
			>⏸</button>

			<div style="flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 4px;">
				<input
					id="music-progress"
					type="range"
					min="0"
					max="100"
					step="0.1"
					value="0"
					aria-label="Progreso de la musica"
					style="width: 100%; accent-color: #ffffff; cursor: pointer;"
				/>
				<div style="display: flex; justify-content: space-between; font-size: 11px; opacity: 0.8;">
					<span id="music-current">0:00</span>
					<span id="music-total">0:00</span>
				</div>
			</div>
		</div>

		<script>
			(function () {
				const audio = document.getElementById("bg-music");
				const button = document.getElementById("music-toggle");
				const progress = document.getElementById("music-progress");
				const current = document.getElementById("music-current");
				const total = document.getElementById("music-total");
				if (!audio || !button || !progress || !current || !total) return;

				const formatTime = (seconds) => {
					if (!Number.isFinite(seconds) || seconds < 0) return "0:00";
					const mins = Math.floor(seconds / 60);
					const secs = Math.floor(seconds % 60)
						.toString()
						.padStart(2, "0");
					return `${mins}:${secs}`;
				};

				const updateLabel = () => {
					button.textContent = audio.paused ? "▶" : "⏸";
					button.setAttribute("aria-label", audio.paused ? "Reproducir musica" : "Pausar musica");
				};

				const updateProgress = () => {
					const duration = Number.isFinite(audio.duration) ? audio.duration : 0;
					const currentTime = Number.isFinite(audio.currentTime) ? audio.currentTime : 0;
					const percent = duration > 0 ? (currentTime / duration) * 100 : 0;
					progress.value = String(percent);
					current.textContent = formatTime(currentTime);
					total.textContent = formatTime(duration);
				};

				const tryAutoPlay = () => {
					audio.play().then(() => {
						updateLabel();
						updateProgress();
					}).catch(() => {
						updateLabel();
						updateProgress();
					});
				};

				button.addEventListener("click", () => {
					if (audio.paused) {
						audio.play().then(() => {
							updateLabel();
							updateProgress();
						}).catch(updateLabel);
					} else {
						audio.pause();
						updateLabel();
						updateProgress();
					}
				});

				progress.addEventListener("input", () => {
					if (!Number.isFinite(audio.duration) || audio.duration <= 0) return;
					const ratio = Number(progress.value) / 100;
					audio.currentTime = ratio * audio.duration;
					updateProgress();
				});

				audio.addEventListener("timeupdate", updateProgress);
				audio.addEventListener("loadedmetadata", updateProgress);
				audio.addEventListener("durationchange", updateProgress);
				audio.addEventListener("play", updateLabel);
				audio.addEventListener("pause", updateLabel);

				const unlockOnce = () => {
					if (audio.paused) {
						audio.play().then(() => {
							updateLabel();
							updateProgress();
						}).catch(updateLabel);
					}
					window.removeEventListener("pointerdown", unlockOnce);
					window.removeEventListener("keydown", unlockOnce);
				};

				window.addEventListener("pointerdown", unlockOnce, { once: true });
				window.addEventListener("keydown", unlockOnce, { once: true });

				tryAutoPlay();
				updateLabel();
				updateProgress();
			})();
		</script>
