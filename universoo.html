        function createStars() {
    const universe = document.getElementById('universe');

        star.style.height = size + 'px';

        function animate() {
    const containers = document.querySelectorAll('.planet-container');
    
    containers.forEach(container => {
        const planet = container.planet;
        const planetEl = container.planetEl;
        
        // Actualizar ángulo del planeta
        let angle = parseFloat(container.dataset.angle);
        angle += planet.speed * 0.5;
        container.dataset.angle = angle;
        
        const rad = angle * Math.PI / 180;
        const x = 500 + Math.cos(rad) * planet.orbitRadius;
        const y = 500 + Math.sin(rad) * planet.orbitRadius;
        
        planetEl.style.left = x + 'px';
        planetEl.style.top = y + 'px';
        planetEl.style.transform = 'translate(-50%, -50%)';

        // 🌙 Actualizar la Luna si existe
        if(container.moon && container.moonContainer){
            let moonAngle = parseFloat(container.moonContainer.dataset.angle);
            moonAngle += 2; // velocidad de la Luna
            container.moonContainer.dataset.angle = moonAngle;

            const moonRad = moonAngle * Math.PI / 180;
            const moonDistance = 50; // distancia de la Luna a la Tierra

            const moonX = x + Math.cos(moonRad) * moonDistance;
            const moonY = y + Math.sin(moonRad) * moonDistance;

            container.moon.style.left = moonX + 'px';
            container.moon.style.top = moonY + 'px';
        }
   // Astronauta
        if(container.astronaut && container.astronautContainer){
            let astroAngle=parseFloat(container.astronautContainer.dataset.angle);
            astroAngle+=3; container.astronautContainer.dataset.angle=astroAngle;
            const astroRad=astroAngle*Math.PI/180; const astroDistance=50;
            const astroX=x+Math.cos(astroRad)*astroDistance; const astroY=y+Math.sin(astroRad)*astroDistance;
            container.astronaut.style.left=astroX+'px'; container.astronaut.style.top=astroY+'px';
        }
    });

    requestAnimationFrame(animate);
}
            
            
        function showInfo(planetName, element) {
    // ❌ cerrar otros mensajes
    document.querySelectorAll('.planet-info').forEach(el => el.remove());

    // Crear contenedor
    const info = document.createElement('div');

    // Clases especiales para Sol o Plutón si quieres ancho distinto
    if (planetName === 'Sol') {
        info.className = 'planet-info sol';
    } else if (planetName === 'Plutón') {
        info.className = 'planet-info pluton';
    } else {
        info.className = 'planet-info';
    }

    // Mensajes especiales
    const messages = {
        'Sol': `✨ Anielka, usted brilla como el sol, y siempre lo hará, con esa sonrisa y esos chocollos ✨
        
Cada rayo de luz que irradia nos llena de alegría.
Su energía ilumina los días más oscuros.
Nunca deje de brillar, porque su luz es única y mágica.
Nos inspira a todos a ser mejores y a soñar sin límites. 🌞💛`,
        'Plutón': `Aunque pequeño y lejano, Plutón nos recuerda que incluso lo más discreto tiene su belleza.
Anielka, como Plutón, su encanto es sutil pero inolvidable.
A veces lo más distante nos toca el corazón más profundo. ❄️💜`
    };

    // Poner contenido: mensaje especial o de planetData
    info.innerHTML = `
        <button onclick="this.parentElement.remove()">×</button>
        <strong>${planetName}</strong><br>
        ${messages[planetName] || planetData[planetName].description || 'Información no disponible'}
    `;

    element.appendChild(info);
}

       const playBtn = document.getElementById('play');
const audio = document.getElementById('audio');
const bar = document.querySelector('.bar');
const progressContainer = document.querySelector('.progress');



// Actualizar barra de progreso
audio.addEventListener('timeupdate', () => {
    const percent = (audio.currentTime / audio.duration) * 100;
    bar.style.width = percent + '%';
});

// Hacer clic en la barra para saltar
progressContainer.addEventListener('click', (e) => {
    const rect = progressContainer.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const percent = x / rect.width;
    audio.currentTime = percent * audio.duration;
}); 
 // 🚫 Bloquear clic derecho
