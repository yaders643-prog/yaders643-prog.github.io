    const mainText  = document.getElementById('mainText');
    const mainBtn   = document.getElementById('mainBtn');
    const finalMsg  = document.getElementById('finalMsg');
    const card      = document.getElementById('card');

    mainBtn.addEventListener('click', () => {
        if (paso >= pasos.length) return;
        const p = pasos[paso];

        mainPhoto.classList.add('fade');
        mainText.classList.add('fade');

        setTimeout(() => {
            mainPhoto.src            = p.foto;
            mainText.innerHTML       = p.texto;
            mainText.style.color     = p.txt;
            document.body.style.backgroundColor = p.bg;
            card.style.borderColor   = p.borde;
            mainBtn.style.backgroundColor = p.btn;
            mainBtn.innerHTML        = p.btnTxt;

            mainPhoto.classList.remove('fade');
            mainText.classList.remove('fade');

            if (p.esFinal) {
                mainBtn.style.display = 'none';
                finalMsg.style.display = 'block';
                finalMsg.style.color   = p.txt;
