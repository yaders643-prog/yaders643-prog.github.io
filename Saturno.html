<script>
  // ════════════════════════════════════════════════════════
//  aqui es donde edita el nombre  y los textos de la esfera
window.SATURNO_TEXTOS = {
  tituloPagina: 'Para ti ✨',
  mensajeInferior: '✦ &nbsp; Para ti🌝 &nbsp; ✦',
  nombreGrabado: 'Yader'
};

const SATURNO_TEXTOS = window.SATURNO_TEXTOS;

document.title = SATURNO_TEXTOS.tituloPagina;

// ════════════════════════════════════════════════════════
//  GALAXIAS Y NEBULOSAS DE FONDO (SUAVE Y PROFUNDO)
// ════════════════════════════════════════════════════════
(function() {
  const galaxyCanvas = document.getElementById('galaxyCanvas');
  const ctx = galaxyCanvas.getContext('2d');
  let time = 0;
  let stars = [];

  function resizeCanvas() {
    galaxyCanvas.width = window.innerWidth;
    galaxyCanvas.height = window.innerHeight;
    generateStars(); 
  }

  // Estrellas fijas: Se crean UNA VEZ para que no parpadeen
  function generateStars() {
    stars = [];
    for(let i = 0; i < 500; i++) {
      stars.push({
        x: Math.random() * galaxyCanvas.width,
        y: Math.random() * galaxyCanvas.height,
        size: Math.random() * 1.2,
        opacity: 0.2 + Math.random() * 0.5
      });
    }
  }

  function drawStars() {
    ctx.fillStyle = 'white';
    stars.forEach(s => {
      ctx.globalAlpha = s.opacity;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;
  }

  function drawGalaxy(x, y, radius, colorHue, opacity, rotation) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(rotation);

    // Núcleo de la galaxia
    const g = ctx.createRadialGradient(0, 0, 0, 0, 0, radius);
    g.addColorStop(0, `hsla(${colorHue}, 80%, 60%, ${opacity})`);
    g.addColorStop(0.4, `hsla(${colorHue}, 60%, 30%, ${opacity * 0.4})`);
    g.addColorStop(1, `hsla(${colorHue}, 40%, 10%, 0)`);
    
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(0, 0, radius, 0, Math.PI * 2);
    ctx.fill();

    // Brazos espirales sutiles
    ctx.strokeStyle = `hsla(${colorHue}, 70%, 50%, ${opacity * 0.15})`;
    ctx.lineWidth = 2;
    for(let j = 0; j < 3; j++) {
      ctx.beginPath();
      for(let a = 0; a < Math.PI * 3; a += 0.1) {
        const r = (a / (Math.PI * 3)) * radius;
        const px = Math.cos(a + j * (Math.PI * 2 / 3)) * r;
        const py = Math.sin(a + j * (Math.PI * 2 / 3)) * r;
        if(a === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      }
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawNebula(x, y, size, colorHue, opacity) {
    const g = ctx.createRadialGradient(x, y, 0, x, y, size);
    g.addColorStop(0, `hsla(${colorHue}, 70%, 40%, ${opacity})`);
    g.addColorStop(0.5, `hsla(${colorHue + 30}, 50%, 20%, ${opacity * 0.5})`);
    g.addColorStop(1, `hsla(${colorHue}, 20%, 5%, 0)`);
    
    ctx.globalCompositeOperation = 'screen'; // Hace que los colores brillen más
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(x, y, size, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalCompositeOperation = 'source-over';
  }
// 🔻 Forzar estado apagado al cargar
function setSphereOff() {
  sphereOn = false;

  [_planet, _rings, _ringGlow].forEach(obj => { 
    if(obj) obj.visible = false; 
  });

  if(typeof moons !== 'undefined') {
    moons.forEach(m => { m.visible = false; });
  }

  if(pointLightBase) pointLightBase.intensity = 0;
  if(saturnSpot)     saturnSpot.intensity = 0;
  if(ledMain)        ledMain.intensity = 0.3;
  if(ledFill)        ledFill.intensity = 0.1;

  if(typeof diffMat !== 'undefined') diffMat.emissiveIntensity = 0.05;
  if(typeof ledRingMat !== 'undefined') ledRingMat.emissiveIntensity = 0.1;

  if(_lightCone) _lightCone.material.opacity = 0.02;
  if(_glowCap)   _glowCap.material.opacity   = 0.01;
  if(_diffuser)  _diffuser.material.opacity  = 0.08;
}
function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}
animate();
  
  
  function animate() {  
    // Fondo negro profundo con un toque de azul
    ctx.fillStyle = '#05030c';
    ctx.fillRect(0, 0, galaxyCanvas.width, galaxyCanvas.height);

    // 1. Nebulosas (Fondo difuso)
    drawNebula(galaxyCanvas.width * 0.3, galaxyCanvas.height * 0.4, 400, 280, 0.15);
    drawNebula(galaxyCanvas.width * 0.7, galaxyCanvas.height * 0.6, 350, 230, 0.12);

    // 2. Estrellas (Estáticas)
    drawStars();

    // 3. Galaxias (Rotación súper lenta: 0.003)
    drawGalaxy(galaxyCanvas.width * 0.2, galaxyCanvas.height * 0.25, 180, 260, 0.4, time * 0.04);
    drawGalaxy(galaxyCanvas.width * 0.85, galaxyCanvas.height * 0.75, 220, 240, 0.3, -time * 0.03);
    drawGalaxy(galaxyCanvas.width * 0.5, galaxyCanvas.height * 0.1, 140, 290, 0.25, time * 0.05);

    time += 0.003; // Control de velocidad global
    requestAnimationFrame(animate);
  }

  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);
  animate();
})();

// ════════════════════════════════════════════════════════
//  AUDIO MP3 DESDE GITHUB (Saturno - Pablo Alborán)
// ════════════════════════════════════════════════════════
let audioPlayer = null;
let muted    = false;
let isPlaying = false;
let audioStarted = false;

// Inicializar el reproductor de audio
function initAudio() {
  audioPlayer = document.getElementById('audioPlayer');
  if(audioPlayer) {
    audioPlayer.volume = 0.85;
    audioPlayer.loop = true;
    
    audioPlayer.addEventListener('play', () => {
      isPlaying = true;
      updatePlayIcon();
    });
    
    audioPlayer.addEventListener('pause', () => {
      isPlaying = false;
      updatePlayIcon();
    });
    
    audioPlayer.addEventListener('error', function(e) {
      console.log('Error reproduciendo audio:', e.target.error);
    });
  }
}

const msg = document.getElementById('msg');
if (msg) {
  msg.innerHTML = SATURNO_TEXTOS.mensajeInferior;
}

// Ejecutar cuando esté listo
if(document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initAudio);
} else {
  initAudio();
}

// Iniciar audio con el primer clic en cualquier parte de la página
function startAudio(){
  if(audioStarted) return;
  if(audioPlayer) {
    // En móviles, a veces el audio empieza muteado por seguridad, 
    // lo aseguramos aquí:
    audioPlayer.muted = false; 
    
    let playPromise = audioPlayer.play();
    
    if (playPromise !== undefined) {
      playPromise.then(() => {
        audioStarted = true;
        isPlaying = true;
        updatePlayIcon();
        // Ocultar hint
        const h = document.getElementById('hint');
        if(h){ h.style.transition='opacity .5s'; h.style.opacity='0'; }
      }).catch(err => {
        console.log('El móvil bloqueó el inicio automático:', err);
      });
    }
  }
}

// Activar con primer clic o toque en cualquier parte
// Activar con primer clic o toque en cualquier parte (Optimizado para móvil)
const mobileEvents = ['click', 'touchstart', 'touchend'];
mobileEvents.forEach(event => {
  document.addEventListener(event, function() {
    startAudio();
    // Intentar forzar el play directamente si startAudio fallara por el hilo
    if(audioPlayer && audioPlayer.paused) {
      audioPlayer.play().catch(e => console.log("Esperando interacción..."));
    }
  }, { once: true });
});
document.addEventListener('touchstart', startAudio, {once:true});

function togglePlay(){
  if(!audioPlayer) {
    console.log('Audio player no disponible');
    return;
  }
  if(isPlaying) {
    audioPlayer.pause();
  } else {
    audioPlayer.play().catch(err => console.log('Error:', err));
  }
}

function updatePlayIcon(){
  const icon = document.getElementById('playIcon');
  if(icon) {
    icon.innerHTML = isPlaying 
      ? '<path d="M6 4h4v16H6V4zm8 0h4v16h-4V4z"/>'
      : '<path d="M8 5v14l11-7z"/>';
  }
}

let sphereOn = false;

// Referencias a objetos que se controlan con el botón
let _planet, _rings, _ringGlow, _glowCap, _lightCone, _diffuser, _ledRingMesh;

  // 🔻 Saturno oculto al iniciar
setTimeout(() => {
  [_planet, _rings, _ringGlow].forEach(obj => { 
    if(obj) obj.visible = false; 
  });
  if(typeof moons !== 'undefined') {
    moons.forEach(m => { m.visible = false; });
  }
}, 100);
  
function toggleSphere(){
  sphereOn = !sphereOn;

  // Solo ocultar Saturno, anillos y lunas — la esfera de cristal permanece visible
  [_planet, _rings, _ringGlow].forEach(obj => { if(obj) obj.visible = sphereOn; });
  if(typeof moons !== 'undefined') moons.forEach(m => { m.visible = sphereOn; });

  // Luces: apagar al máximo pero dejar un tenue ambiente para ver la esfera oscura
  if(typeof pointLightBase !== 'undefined') pointLightBase.intensity = sphereOn ? 12 : 0;
  if(typeof saturnSpot     !== 'undefined') saturnSpot.intensity     = sphereOn ? 5.2 : 0;
  if(typeof ledMain        !== 'undefined') ledMain.intensity        = sphereOn ? 8.0 : 0.3;
  if(typeof ledFill        !== 'undefined') ledFill.intensity        = sphereOn ? 3.5 : 0.1;
  if(typeof diffMat        !== 'undefined') diffMat.emissiveIntensity= sphereOn ? 5.5 : 0.05;
  if(typeof ledRingMat     !== 'undefined') ledRingMat.emissiveIntensity = sphereOn ? 8 : 0.1;
  // Cono de luz y glow cap — muy tenues al apagar
  if(_lightCone) _lightCone.material.opacity = sphereOn ? 0.26 : 0.02;
  if(_glowCap)   _glowCap.material.opacity   = sphereOn ? 0.11 : 0.01;
  if(_diffuser)  _diffuser.material.opacity  = sphereOn ? 0.92 : 0.08;

  // Botón 3D: verde = encendido, rojo = apagado
  if(typeof powerButtonMesh !== 'undefined'){
    const bc = sphereOn ? 0x00dd44 : 0xff2200;
    powerButtonMesh.material.color.setHex(bc);
    powerButtonMesh.material.emissive.setHex(bc);
    powerButtonMesh.material.emissiveIntensity = sphereOn ? 2.5 : 2.0;
  }
  if(typeof pbPointLight !== 'undefined'){
    pbPointLight.color.setHex(sphereOn ? 0x00dd44 : 0xff2200);
    pbPointLight.intensity = sphereOn ? 1.5 : 1.0;
  }

  const icon = document.getElementById('powerIcon');
  if(icon){
    icon.innerHTML = sphereOn
      ? '<path d="M12 3v10" stroke="currentColor" stroke-width="2" fill="none"/><path d="M7 12a5 5 0 1 1 10 0" stroke="currentColor" stroke-width="2" fill="none"/>'
      : '<path d="M5 12h14" stroke="currentColor" stroke-width="2" fill="none"/>';
  }
}

function toggleMute(){
  if(!audioPlayer) return;
  muted = !muted;
  audioPlayer.muted = muted;
  const icon = document.getElementById('muteIcon');
  icon.innerHTML = muted
    ? '<path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>'  
    : '<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>';
}

// ════════════════════════════════════════════════════════
//  PARTÍCULAS CSS FLOTANTES
// ════════════════════════════════════════════════════════
;(function(){
  const s = ['✨','💫','⭐','🌟','💖','💛','🧡','🤍'];
 function spawn(){
    const d=document.createElement('div');
    d.className='sp';
    d.textContent=s[Math.floor(Math.random()*s.length)];
    const dur=7+Math.random()*9;
    d.style.cssText=`left:${8+Math.random()*84}vw;bottom:0;
      color:hsl(${28+Math.random()*42},100%,${68+Math.random()*22}%);
      font-size:${7+Math.random()*13}px;animation-duration:${dur}s;`;
    document.body.appendChild(d);
    setTimeout(()=>d.remove(), dur*1000);
  }
  for(let i=0;i<6;i++) setTimeout(spawn, i*350);
  setInterval(spawn, 750);
})();

// ════════════════════════════════════════════════════════
//  THREE.JS
// ════════════════════════════════════════════════════════
const canvas   = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:true});
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type    = THREE.PCFSoftShadowMap;
renderer.toneMapping       = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.35;

const scene  = new THREE.Scene();
// Busca esta línea, debe estar cerca de la línea 320-330 de tu archivo
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.05, 100);

camera.position.set(0, 1.5, 28); 

// Asegúrate de que esta línea también esté para que la cámara siga apuntando al centro
camera.lookAt(0, 0, 0);

function setSize(){
  const w = window.innerWidth;
  const h = window.innerHeight;

  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
setSize();
window.addEventListener('resize', setSize);

// ── Constantes de layout ─────────────────────────────────
const GLOBE_R  = 1.70;
const BASE_H   = 0.60;       // altura de la base (más alta = más visible)
const BASE_Y   = -2.00;      // centro geométrico de la base
const BASE_TOP = BASE_Y + BASE_H * 0.5;
const GLOBE_CY = BASE_TOP + GLOBE_R + 0.03;

// ════════════════════════════════════════════════════════
//  LUCES
// ════════════════════════════════════════════════════════
const ledMain = new THREE.PointLight(0xffaa33, 8.0, 12);
ledMain.position.set(0, BASE_TOP - 0.02, 0);
ledMain.castShadow = true;
ledMain.shadow.mapSize.set(1024,1024);
scene.add(ledMain);

  
const ledFill = new THREE.PointLight(0xff8822, 3.5, 18);
ledFill.position.set(0, BASE_Y - 0.1, 0);
scene.add(ledFill);

scene.add(new THREE.AmbientLight(0x0d0820, 1.2));

const coolLight = new THREE.DirectionalLight(0x88aadd, 0.20);
coolLight.position.set(-3, 7, 2);
scene.add(coolLight);

const rim = new THREE.PointLight(0x223366, 0.9, 18);
rim.position.set(0, 2, -5.5);
scene.add(rim);

// Luz extra apuntando directo a Saturno para hacerlo brillar más
const saturnSpot = new THREE.PointLight(0xffeedd, 5.2, 12);
saturnSpot.position.set(1.5, 2.5, 3);
scene.add(saturnSpot);

// Luz de foco en la base para iluminar el centro desde abajo
const pointLightBase = new THREE.PointLight(0xffcc77, 12, 10);
pointLightBase.position.set(0, BASE_TOP + 0.14, 0);

function makeWoodTex(w=1024, h=512){
  const cv=document.createElement('canvas'); cv.width=w; cv.height=h;
  const cx=cv.getContext('2d');

  // Fondo base — madera café cálida real
  const bg=cx.createLinearGradient(0,0,0,h);
  bg.addColorStop(0,'#c47830');
  bg.addColorStop(0.25,'#b06828');
  bg.addColorStop(0.6,'#a05c20');
  bg.addColorStop(1,'#8a4c18');
  cx.fillStyle=bg; cx.fillRect(0,0,w,h);

  // Vetas finas horizontales — tonos café variados
  for(let i=0;i<90;i++){
    const y=Math.random()*h;
    const thickness=0.6+Math.random()*4;
    const dark=Math.random()>.45;
    const g2=cx.createLinearGradient(0,y,w,y+thickness);
    const a=0.12+Math.random()*0.32;
    g2.addColorStop(0,   dark?`rgba(80,38,8,${a})`:`rgba(220,160,80,${a*0.5})`);
    g2.addColorStop(0.3, dark?`rgba(100,50,12,${a*0.6})`:`rgba(240,185,100,${a*0.6})`);
    g2.addColorStop(0.7, dark?`rgba(85,42,10,${a*0.8})`:`rgba(210,150,70,${a*0.4})`);
    g2.addColorStop(1,   dark?`rgba(75,35,8,${a})`:`rgba(200,140,60,${a*0.5})`);
    cx.fillStyle=g2;
    cx.fillRect(0, y, w, thickness);
  }

  // Nodos de madera (nudos)
  for(let k=0;k<3;k++){
    const nx=Math.random()*w, ny=Math.random()*h;
    const rr=20+Math.random()*40;
    for(let ring=rr;ring>2;ring-=3){
      const ng=cx.createEllipse?null:null;
      cx.beginPath();
      cx.ellipse(nx, ny, ring*1.6, ring, Math.random()*0.5, 0, Math.PI*2);
      cx.strokeStyle=`rgba(30,12,2,${0.04+Math.random()*0.06})`;
      cx.lineWidth=1.5;
      cx.stroke();
    }
  }

  // Barniz brillante superior
  const sh=cx.createLinearGradient(0,0,0,h);
  sh.addColorStop(0,'rgba(255,210,120,0.18)');
  sh.addColorStop(0.15,'rgba(255,190,90,0.08)');
  sh.addColorStop(0.5,'rgba(255,170,60,0.03)');
  sh.addColorStop(1,'rgba(0,0,0,0.25)');
  cx.fillStyle=sh; cx.fillRect(0,0,w,h);

  // Brillo lateral
  const side=cx.createLinearGradient(0,0,w*0.12,0);
  side.addColorStop(0,'rgba(255,220,140,0.12)');
  side.addColorStop(1,'rgba(0,0,0,0)');
  cx.fillStyle=side; cx.fillRect(0,0,w,h);

  return new THREE.CanvasTexture(cv);
}

function makeEngravedTextTex(){
  const W=1024, H=220;
  const cv=document.createElement('canvas'); cv.width=W; cv.height=H;
  const cx=cv.getContext('2d');
  cx.clearRect(0,0,W,H);

  // Sombra oscura — efecto de grabado en madera
  cx.shadowColor='rgba(0,0,0,0.95)';
  cx.shadowOffsetX=4; cx.shadowOffsetY=5; cx.shadowBlur=10;

  // Stroke dorado fino
  cx.strokeStyle='rgba(210,160,60,0.55)';
  cx.lineWidth=3;
  cx.strokeText(SATURNO_TEXTOS.nombreGrabado, W/2, H/2);

  // Relleno blanco nacarado
  const tg=cx.createLinearGradient(0, H/2-52, 0, H/2+52);
  tg.addColorStop(0,'#ffffff');
  tg.addColorStop(0.25,'#f8f4ee');
  tg.addColorStop(0.6,'#ede8df');
  tg.addColorStop(1,'#d8d0c4');
  cx.fillStyle=tg;
  cx.fillText(SATURNO_TEXTOS.nombreGrabado, W/2, H/2);


  // Líneas decorativas
  cx.shadowColor='transparent';
  cx.strokeStyle='rgba(255,255,255,0.35)'; cx.lineWidth=1.5;
  cx.beginPath(); cx.moveTo(30,26); cx.lineTo(W-30,26); cx.stroke();

  // Estrellas
  cx.font='22px Georgia';
  cx.fillStyle='rgba(255,255,255,0.55)';
  cx.shadowColor='rgba(255,255,255,0.4)'; cx.shadowBlur=8;
  cx.fillText('✦', 52, H/2+2);

}

function makeSaturnTex(){
  const W=1024,H=512,cv=document.createElement('canvas');
  cv.width=W; cv.height=H;
  const cx=cv.getContext('2d');
  cx.fillStyle='#c09848'; cx.fillRect(0,0,W,H);
  const bands=[
    [0.00,0.06,'#b89050'],[0.06,0.04,'#7a5020'],
    [0.10,0.10,'#d0b068'],[0.20,0.03,'#6e4418'],
    [0.23,0.16,'#e2c880'],[0.39,0.04,'#906030'],
    [0.43,0.06,'#c8a858'],[0.49,0.10,'#ead890'],
    [0.59,0.04,'#886030'],[0.63,0.12,'#d4b060'],
    [0.75,0.04,'#7a5020'],[0.79,0.14,'#c4a060'],
    [0.93,0.07,'#b09050'],
  ];
  function shiftHex(hex,amt){
    const r=parseInt(hex.slice(1,3),16);
    const g=parseInt(hex.slice(3,5),16);
    const b=parseInt(hex.slice(5,7),16);
    const c=v=>Math.max(0,Math.min(255,v));
    return `rgb(${c(r+amt)},${c(g+amt)},${c(b+amt)})`;
  }
  bands.forEach(([y,h,col])=>{
    for(let i=0;i<6;i++){
      const ys=(y+i*h/6)*H, he=h/6*H+1;
      const g=cx.createLinearGradient(0,ys,0,ys+he);
      g.addColorStop(0,col); g.addColorStop(1,shiftHex(col,i%2===0?14:-10));
      cx.fillStyle=g; cx.fillRect(0,ys,W,he);
    }
  });
  cx.globalAlpha=0.10;
  for(let i=0;i<250;i++){
    const ry=Math.random()*H;
    cx.fillStyle=`rgba(${Math.random()>.5?220:70},${80+Math.random()*60},10,1)`;
    cx.fillRect(Math.random()*W*0.2,ry,W*(0.5+Math.random()*0.5),1+Math.random()*2);
  }
  cx.globalAlpha=1;
  const pn=cx.createRadialGradient(W/2,0,0,W/2,0,W*0.32);
  pn.addColorStop(0,'rgba(245,220,170,0.55)');
  pn.addColorStop(1,'rgba(0,0,0,0)');
  cx.fillStyle=pn; cx.fillRect(0,0,W,H/2);
  return new THREE.CanvasTexture(cv);
}

function makeRingTex() {
  const W = 2048; // Mayor resolución para evitar saltos
  const cv = document.createElement('canvas');
  cv.width = W; cv.height = 1;
  const cx = cv.getContext('2d');

  // Fondo base semi-transparente
  cx.fillStyle = 'rgba(0,0,0,0)';
  cx.fillRect(0,0,W,1);

  // Definición de bandas (basado en la foto real)
  // [inicio_x, ancho, color_base, opacidad_extra]
  const bands = [
    [0.00, 0.08, '#443322', 0.1], // Parte interna difusa
    [0.08, 0.15, '#9a8260', 0.6], // Anillo C
    [0.23, 0.35, '#d4c2a0', 0.9], // Anillo B (el más brillante)
    [0.58, 0.02, '#111111', 1.0], // División de Cassini (hueco)
    [0.60, 0.25, '#b8a680', 0.8], // Anillo A
    [0.85, 0.01, '#222222', 0.7], // División de Encke
    [0.86, 0.10, '#887550', 0.4], // Borde exterior
  ];

  bands.forEach(([x, w, col, op]) => {
    let grad = cx.createLinearGradient(x * W, 0, (x + w) * W, 0);
    grad.addColorStop(0, 'rgba(0,0,0,0)');
    grad.addColorStop(0.1, col);
    grad.addColorStop(0.5, col);
    grad.addColorStop(0.9, col);
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    
    cx.globalAlpha = op;
    cx.fillStyle = grad;
    cx.fillRect(x * W, 0, w * W, 1);
  });

  // Añadir micro-estriado (ruido para simular partículas)
  for(let i=0; i<W; i++) {
    if(Math.random() > 0.5) {
      cx.fillStyle = `rgba(255,255,255,${Math.random()*0.15})`;
      cx.fillRect(i, 0, 1, 1);
    }
  }

  const t = new THREE.CanvasTexture(cv);
  t.wrapS = THREE.ClampToEdgeWrapping;
  return t;
}

// ════════════════════════════════════════════════════════
//  MOUSE / TOUCH - CONTROL ORBITAL 3D (DRAG REQUERIDO)
// ════════════════════════════════════════════════════════
let mx = -Math.PI / 4;  // Posición lateral inicial
let my = Math.PI / 2 - 0.3;  // Ángulo de elevación para vista lateral
let orbitalRadius = 7.2;
let targetRadius = 7.2;
const minRadius = 3;
const maxRadius = 15;
let isMouseDown = false;
let lastMouseX = 0;
let lastMouseY = 0;

// Mouse DOWN - iniciar drag
document.addEventListener('mousedown', e => {
  isMouseDown = true;
  lastMouseX = e.clientX;
  lastMouseY = e.clientY;
});

// Mouse MOVE - solo si está presionado
document.addEventListener('mousemove', e => {
  if(isMouseDown) {
    const deltaX = e.clientX - lastMouseX;
    const deltaY = e.clientY - lastMouseY;
    mx += deltaX * 0.01;
    my += deltaY * 0.01;
    my = Math.max(-Math.PI * 0.4, Math.min(Math.PI * 0.4, my));
    lastMouseX = e.clientX;
    lastMouseY = e.clientY;
  }
});

// Mouse UP - terminar drag
document.addEventListener('mouseup', () => {
  isMouseDown = false;
});

// Touch para dispositivos móviles - drag táctil
let lastTouchX = 0;
let lastTouchY = 0;
let touchActive = false;

document.addEventListener('touchstart', e => {
  if(e.touches.length === 1) {
    touchActive = true;
    lastTouchX = e.touches[0].clientX;
    lastTouchY = e.touches[0].clientY;
  }
}, {passive: true});

document.addEventListener('touchmove', e => {
  if(touchActive && e.touches.length === 1) {
    const deltaX = e.touches[0].clientX - lastTouchX;
    const deltaY = e.touches[0].clientY - lastTouchY;
    mx += deltaX * 0.01;
    my += deltaY * 0.01;
    my = Math.max(-Math.PI * 0.4, Math.min(Math.PI * 0.4, my));
    lastTouchX = e.touches[0].clientX;
    lastTouchY = e.touches[0].clientY;
  } else if(e.touches.length === 2) {
    // Zoom táctil con pellizco
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const distance = Math.sqrt(dx*dx + dy*dy);
    if(lastTouchX > 0) {
      const delta = distance - lastTouchX;
      targetRadius -= delta * 0.01;
      targetRadius = Math.max(minRadius, Math.min(maxRadius, targetRadius));
    }
    lastTouchX = distance;
  }
}, {passive: true});

document.addEventListener('touchend', () => {
  touchActive = false;
  lastTouchX = 0;
});

// Scroll para zoom
document.addEventListener('wheel', e => {
  e.preventDefault();
  targetRadius += e.deltaY > 0 ? 0.5 : -0.5;
  targetRadius = Math.max(minRadius, Math.min(maxRadius, targetRadius));
}, {passive: false});

// Función para calcular posición de cámara en órbita esférica
function updateCameraPosition(){
  orbitalRadius += (targetRadius - orbitalRadius) * 0.1;  // Interpolación suave del zoom
  
  // Posición en coordinadas esféricas
  const x = Math.sin(my) * Math.cos(mx) * orbitalRadius;
  const z = Math.sin(my) * Math.sin(mx) * orbitalRadius;
  const y = Math.cos(my) * orbitalRadius;
  
  camera.position.set(x, y + 0.5, z);
  camera.lookAt(0, GLOBE_CY * 0.35, 0);
}

// ════════════════════════════════════════════════════════
//  CLICK EN INTERRUPTOR 3D (Raycaster)
// ════════════════════════════════════════════════════════
const raycaster3D = new THREE.Raycaster();
const mouse3D = new THREE.Vector2();

function getCanvasMouse(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  return {
    x:  ((clientX - rect.left)  / rect.width)  * 2 - 1,
    y: -((clientY - rect.top)   / rect.height) * 2 + 1
  };
}

window.addEventListener('click', (event) => {
  const m = getCanvasMouse(event.clientX, event.clientY);
  mouse3D.set(m.x, m.y);
  raycaster3D.setFromCamera(mouse3D, camera);
  const hits = raycaster3D.intersectObjects([powerButtonMesh, pbBase], true);
  if (hits.length > 0) toggleSphere();
});

window.addEventListener('touchend', (event) => {
  if(event.changedTouches.length === 0) return;
  const t0 = event.changedTouches[0];
  const m = getCanvasMouse(t0.clientX, t0.clientY);
  mouse3D.set(m.x, m.y);
  raycaster3D.setFromCamera(mouse3D, camera);
  const hits = raycaster3D.intersectObjects([powerButtonMesh, pbBase], true);
  if (hits.length > 0) {
    event.preventDefault();
    toggleSphere();
  }
}, { passive: false });

// ════════════════════════════════════════════════════════
//  LOOP DE ANIMACIÓN
// ════════════════════════════════════════════════════════
let t=0;
const clock=new THREE.Clock();

function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),0.05);
  t+=dt;

  saturnGroup.rotation.y += 0.001;  // giro muy lento y suave
  saturnGroup.position.y  = GLOBE_CY + Math.sin(t*0.5)*0.055;
  // Saturno brilla más intensamente en ciclo
  const sg = 0.28 + Math.sin(t*0.9)*0.10;
  if(sphereOn) planet.material.emissiveIntensity = sg;
  saturnSpot.intensity = sphereOn ? (2.8 + Math.sin(t*1.1)*0.6) : 0;
  dustPts.rotation.y     += 0.0011;
  dustPts.rotation.x     += 0.0004;

  // Pulsación LED — solo cuando está encendido
  const p = 1 + Math.sin(t*1.7)*0.13 + Math.sin(t*0.65)*0.07;
  if(sphereOn){
    ledMain.intensity            = 8.0 * p;
    ledFill.intensity            = 3.5 * p;
    diffMat.emissiveIntensity    = 5.5 * p;
    ledRingMat.emissiveIntensity = 8.0 * p;
    lightCone.material.opacity   = 0.26 * p;
    glowCap.material.opacity     = 0.11 * p;
  }
  flare1.material.opacity     = 0.55 + Math.sin(t*2.2)*0.07;
  flare2.material.opacity     = 0.12 + Math.sin(t*1.5)*0.03;

 moons.forEach(moon=>{
  moon.userData.angle += moon.userData.speed * dt;

  const a = moon.userData.angle;
  const d = moon.userData.dist;
  const h = moon.userData.yoffset;

  moon.position.set(
    d * Math.cos(a),
    h + Math.sin(a * 2.0) * 0.04, // 👈 SIN GLOBE_CY
    d * Math.sin(a)
  );
});

  // Texto estático — sin animación

  // Pulso del botón de encendido 3D
  if (typeof pbPointLight !== 'undefined' && sphereOn) {
    pbPointLight.intensity = 1.4 + Math.sin(t * 2.2) * 0.25;
  }

  // Actualizar posición de cámara con control orbital 3D
  updateCameraPosition();
// Añade esto dentro de tu función animate()
const time = Date.now() * 0.001;
saturnGroup.position.y = GLOBE_CY + Math.sin(time * 0.5) * 0.05; 
// Esto hace que suba y baje 5cm muy suavemente
  renderer.render(scene, camera);
}
animate();
  let currentScroll = 0;
let targetScroll = 0;
let ease = 0.08; // mientras más bajo, más suave

window.addEventListener('wheel', (e) => {
  targetScroll += e.deltaY;
});

function smoothScroll() {
  currentScroll += (targetScroll - currentScroll) * ease;
  window.scrollTo(0, currentScroll);
  requestAnimationFrame(smoothScroll);
}

smoothScroll();
