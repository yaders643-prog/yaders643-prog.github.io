// 💥 EXPLOSIÓN DE IMÁGENES
// 💥 EXPLOSIÓN MEJORADA
function createParticle(x, y) {

  const frases = [
    "La amo ",
    "Anielka ",
    "Solo usted ",
    "Mi amor ",
    "Es única ",
    "Me encanta ",
    "Es mi todo "
  ];

  const texto = frases[Math.floor(Math.random() * frases.length)];

  for (let i = 0; i < texto.length; i++) {

    const span = document.createElement('span');
    span.innerText = texto[i];

    span.style.position = 'absolute';
    span.style.left = x + 'px';
    span.style.top = y + 'px';
    span.style.fontSize = "24px";
    span.style.fontWeight = "bold";
    span.style.pointerEvents = 'none';
    span.style.opacity = 0;

    const colores = ["#ff1744", "#ff4081", "#ff80ab", "#e91e63", "#ffd700"];
    span.style.color = colores[Math.floor(Math.random() * colores.length)];

    particleContainer.appendChild(span);

    const offsetX = (i - texto.length / 2) * 20;
    const finalX = x + offsetX;
    const finalY = y;

    let posX = x;
    let posY = y;

    function animate() {
      posX += (finalX - posX) * 0.1;
      posY += (finalY - posY) * 0.1;

      span.style.left = posX + 'px';
      span.style.top = posY + 'px';
      span.style.opacity = 1;

      if (Math.abs(posX - finalX) > 0.5) {
        requestAnimationFrame(animate);
      }
    }

    animate();

    setTimeout(() => {
      span.style.transition = "opacity 1s";
      span.style.opacity = 0;
      setTimeout(() => span.remove(), 1000);
    }, 2500);
  }
}
