    <style>
        /* --- REGLAS GLOBALES PARA QUITAR SELECCIÓN Y RESALTADO --- */
        * {
            /* Evita que se seleccione texto o imágenes al arrastrar/doble clic */
            -webkit-user-select: none; /* Safari/Chrome */
            -moz-user-select: none;    /* Firefox */
            -ms-user-select: none;     /* IE/Edge */
            user-select: none;         /* Estándar */
            
            /* Quita el recuadro azul/gris al tocar en móviles */
            -webkit-tap-highlight-color: transparent;
            
            /* Quita el borde de enfoque al hacer clic */
            outline: none;
        }

        /* --- FONDO --- */
        body { 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            background: radial-gradient(circle at center, #2b0a0a 0%, #000000 100%);
            overflow: hidden;
            font-family: sans-serif;
            cursor: default; /* Flecha normal siempre */
        }

        /* --- CORAZONES --- */
        .hearts-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0; pointer-events: none;
        }
        .heart {
            position: absolute; bottom: -50px; color: #ff3344; opacity: 0.3; font-size: 24px;
            animation: floatUp 10s linear infinite;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.5); opacity: 0; }
            20% { opacity: 0.4; }
            100% { transform: translateY(-110vh) scale(1.2); opacity: 0; }
        }

        /* --- CANVAS --- */
        .canvas { 
            width: 90%; max-width: 401px; aspect-ratio: 401 / 521; 
            display: flex; justify-content: center; align-items: center; 
            position: relative; z-index: 5;
        }
        
        svg { 
            width: 100%; height: 100%; overflow: visible; 
            filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.2)); 
            pointer-events: none; /* El SVG no recibe clics para evitar selecciones accidentales */
        }

        /* Animación de línea (controlada por JS) */
        @keyframes drawLine { 
            to { stroke-dashoffset: 0; } 
        }

        /* Estilo base de los trazos (ocultos al inicio) */
        path {
            opacity: 0;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: transparent;
        }

        /* --- BOTONES --- */
        .gift-btn, .restart-btn {
            background: linear-gradient(45deg, #ff004c, #ff4d4d);
            color: white; 
            border: none; 
            padding: 18px 45px;
            font-size: 20px; 
            border-radius: 50px; 
            cursor: pointer; 
            font-weight: bold;
            text-transform: uppercase; 
            letter-spacing: 2px;
            box-shadow: 0 0 20px rgba(255, 0, 76, 0.6);
            animation: heartbeat 1.5s infinite; 
            transition: 0.3s;
            /* Asegura que el botón sí reciba clics */
            pointer-events: auto; 
        }

        .gift-btn:hover, .restart-btn:hover { 
            transform: scale(1.1); 
            box-shadow: 0 0 40px rgba(255, 0, 76, 0.9); 
        }
        
        .gift-btn {
            position: absolute; 
            z-index: 20;
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); box-shadow: 0 0 25px rgba(255, 0, 76, 0.8); }
            100% { transform: scale(1); }
        }

        /* --- CONTENEDOR REINICIO --- */
        .restart-container {
            margin-top: 40px; 
            z-index: 10; 
            opacity: 0; 
            transition: opacity 1s;
            pointer-events: none;
            text-align: center;
        }
        .restart-container.visible { 
            opacity: 1; 
            pointer-events: all;
        }
        
    </style>  
</head>

        <button class="restart-btn" onclick="restart()">Reiniciar Regalo</button>
    </div>

    <script>
        function createHearts() {
            const container = document.getElementById('heartsBg');
            const heartCount = 20; 

            for (let i = 0; i < heartCount; i++) {
                const heart = document.createElement('div');
                heart.classList.add('heart');
                heart.innerHTML = '❤';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
                heart.style.animationDuration = (Math.random() * 5 + 5) + 's';
                heart.style.animationDelay = (Math.random() * 5) + 's';
                container.appendChild(heart);
            }
        }

        function openGift() {
            const giftBtn = document.getElementById('giftBtn');
            const svg = document.getElementById('main-svg');
            const restartContainer = document.getElementById('restartContainer');
            const paths = svg.querySelectorAll('path');

            // 1. Animación del botón
            giftBtn.style.transform = "scale(1.5)";
            giftBtn.style.opacity = "0";
            
            setTimeout(() => {
                giftBtn.style.display = 'none';
                
                // 2. Lógica de dibujo secuencia perfecta (JS)
                let currentDelay = 0;
                let speed = 550; // Velocidad en píxeles por segundo (ajústalo si quieres más lento/rápido)

                paths.forEach((path) => {
                    const length = path.getTotalLength();
                    const duration = length / speed; // Duración proporcional a la longitud

                    // Configuración inicial del trazo invisible
                    path.style.strokeDasharray = length;
                    path.style.strokeDashoffset = length;
                    path.style.opacity = "1"; // Hacemos visible el elemento (pero el trazo está oculto por offset)

                    // Asignamos la animación
                    path.style.animation = `drawLine ${duration}s linear forwards`;
                    path.style.animationDelay = `${currentDelay}s`;

                    // Sumamos el tiempo para el siguiente trazo
                    currentDelay += duration;
                });

                // 3. Mostrar botón de reinicio al terminar todo
                setTimeout(() => {
                    restartContainer.classList.add('visible');
                }, (currentDelay * 1000) + 100); // Esperamos el tiempo total calculado + un margen

            }, 400); 
        }

        function restart() {
            location.reload();
        }

        createHearts();
    </script>
